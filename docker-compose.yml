version: '3.8'\n\nservices:\n  db:\n    image: postgres:latest\n    environment:\n      POSTGRES_USER: user\n      POSTGRES_PASSWORD: password\n      POSTGRES_DB: leotiels_db\n    ports:\n      - '5432:5432'\n\n  backend:\n    build: ./backend\n    environment:\n      DATABASE_URL: postgres://user:password@db/leotiels_db\n    ports:\n      - '5000:5000'\n    depends_on:\n      - db\n\n  frontend:\n    build: ./frontend\n    ports:\n      - '3000:3000'\n